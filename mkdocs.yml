# Project information
site_name: google-okf
site_author: Sachin Mishra
site_description: >-
  Python library to connect to any data source (files, databases) and convert them to the standard Google Open Knowledge Format (OKF).

# Repository
repo_name: SachinMishra-ux/Open_Knowledge_Format
repo_url: https://github.com/SachinMishra-ux/Open_Knowledge_Format

# Table of Contents
nav:
  - Home: index.md
  - API Reference: APIreference.md

# Configuration
theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - toc.integrate
    - navigation.top
  language: en
  palette:
    - scheme: default
      toggle:
        icon: material/toggle-switch-off-outline 
        name: Switch to dark mode
      primary: indigo
      accent: blue 
    - scheme: slate 
      toggle:
        icon: material/toggle-switch
        name: Switch to light mode    
      primary: indigo
      accent: light-blue    

extra:
  social:
    - icon: fontawesome/brands/github-alt
      link: https://github.com/SachinMishra-ux
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/sachin-mishra19566/

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - admonition
  - pymdownx.arithmatex:
      generic: true
  - footnotes
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.mark

plugins:
  - search

copyright: |
  &copy; 2026 <a href="https://github.com/SachinMishra-ux" target="_blank" rel="noopener">Sachin Mishra</a>
